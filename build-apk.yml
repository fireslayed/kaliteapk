name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Gradle izni ver
        run: chmod +x android-webview/gradlew

      - name: APK build et
        run: |
          cd android-webview
          ./gradlew assembleRelease

      - name: APK'yı kaydet
        uses: actions/upload-artifact@v4
        with:
          name: Kalite-Checker-APK
          path: android-webview/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
